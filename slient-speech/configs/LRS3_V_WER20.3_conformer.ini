# auto-AVSR conformer checkpoint — trained on 3291h (LRS2+LRS3+VoxCeleb2+AVSpeech)
# Download model first: ./setup_autoavsr.sh

[input]
modality=video
v_fps=25

[model]
v_fps=25
model_path=benchmarks/LRS3/models/LRS3_V_WER20.3_conformer/model.pth
model_conf=benchmarks/LRS3/models/LRS3_V_WER20.3_conformer/model.json
rnnlm=benchmarks/LRS3/language_models/lm_en_subword/model.pth
rnnlm_conf=benchmarks/LRS3/language_models/lm_en_subword/model.json

[decode]
beam_size=40
penalty=0.3
maxlenratio=0.0
minlenratio=0.0
ctc_weight=0.1
lm_weight=0.6
